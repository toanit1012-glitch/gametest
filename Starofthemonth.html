<script>

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function fireConfettiLoop(){

let end=Date.now()+3000

let interval=setInterval(()=>{

confetti({
particleCount:40,
spread:70,
origin:{y:0.6}
})

if(Date.now()>end) clearInterval(interval)

},200)

}

function startDraw(){

let names=document.getElementById("names").value
.split("\n")
.map(x=>x.trim())
.filter(x=>x!="")

shuffle(names)

let winners=names.slice(0,5)

document.getElementById("spinSound").play()

for(let i=1;i<=5;i++){

let slot=document.querySelector("#slot"+i+" span")

let counter=0

let interval=setInterval(()=>{

slot.style.transform="translateY(-20px)"

slot.innerText=names[Math.floor(Math.random()*names.length)]

counter++

if(counter>25+i*5){

clearInterval(interval)

slot.innerText=winners[i-1]

document.getElementById("slot"+i).classList.add("winner")

addHistory(winners[i-1])

document.getElementById("winSound").play()

fireConfettiLoop()

}

},80)

}

}

function addHistory(name){

let table=document.getElementById("historyTable")

let row=table.insertRow(-1)

row.insertCell(0).innerText=table.rows.length-1
row.insertCell(1).innerText=name

}

</script>
